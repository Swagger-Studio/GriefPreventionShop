# ==========================================================
# GRIEF PREVENTION SHOP - CONFIGURATION
# ==========================================================
# Support Discord: https://discord.gg/Yxq6H8cb
# Official Website: https://swaggers.studio/
# ==========================================================
# For support or custom feature requests, join our Discord.

# The prefix used in all plugin messages
# Supports Legacy Codes (&), HEX (&#RRGGBB)
prefix: "&#FFC427&lCLAIM SHOP &7➟"

# The currency symbol used for all money displays
# Supports HEX and Legacy
currency-symbol: "&e$"

# The cost of a single claim block
price-per-block: 100.0

# Purchase Limits
# Restrict the amount of blocks a player can buy in a single transaction.
limits:
  min-purchase: 1
  max-purchase: 1000000

# Command settings
# You can define a main command and multiple aliases.
# These will be applied immediately upon /gpshop reload.
commands:
  main: "claimshop"
  aliases:
    - "gpshop"
    - "griefshop"
    - "claims"

# Log settings
logging:
  enabled: true
  path: "logs"

# Sound settings
sounds:
  purchase:
    enabled: true
    sound: "ENTITY_PLAYER_LEVELUP"
    volume: 1.0
    pitch: 1.0
  insufficient-funds:
    enabled: true
    sound: "ENTITY_VILLAGER_HURT"
    volume: 1.0
    pitch: 1.0

# Individual History settings
history:
  # Allows players to see their own purchase history via command (GUI)
  enabled: true
  command: "claimhistory"
  # Default timezone for history logs (e.g., Asia/Kolkata, UTC, etc.)
  timezone: "Asia/Kolkata"
  # Maximum entries to store in history per player
  max-entries: 50
