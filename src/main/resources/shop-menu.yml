# ==========================================================
# GRIEF PREVENTION SHOP
# ==========================================================

gui:
  size: 36
  title: "&#FFC427&lTREASURY &8➟ &7Amount: &#FFC427<amount>"

  # ----------------------------------------------------------
  # ADD BLOCKS
  # ----------------------------------------------------------
  buttons:
    add:
      "15":
        amount: 50
        slot: 15
        material: EMERALD_BLOCK
        display-name: "&a&lADD BLOCKS &8➟ &f+50"
        lore:
          - ""
          - "&7Increase your order by"
          - "&7exactly &e50 &7blocks."
          - ""
          - "&e» &fLeft-Click to Add"
      "16":
        amount: 100
        slot: 16
        material: EMERALD_BLOCK
        display-name: "&a&lADD BLOCKS &8➟ &f+100"
        lore:
          - ""
          - "&7Increase your order by"
          - "&7exactly &e100 &7blocks."
          - ""
          - "&e» &fLeft-Click to Add"
      "17":
        amount: 500
        slot: 17
        material: EMERALD_BLOCK
        display-name: "&a&lADD BLOCKS &8➟ &f+500"
        lore:
          - ""
          - "&7Increase your order by"
          - "&7exactly &e500 &7blocks."
          - ""
          - "&e» &fLeft-Click to Add"

    # ----------------------------------------------------------
    # REMOVE BLOCKS
    # ----------------------------------------------------------
    remove:
      "11":
        amount: 50
        slot: 11
        material: REDSTONE_BLOCK
        display-name: "&c&lREMOVE BLOCKS &8➟ &f-50"
        lore:
          - ""
          - "&7Decrease your order by"
          - "&7exactly &c50 &7blocks."
          - ""
          - "&c» &fLeft-Click to Remove"
      "10":
        amount: 100
        slot: 10
        material: REDSTONE_BLOCK
        display-name: "&c&lREMOVE BLOCKS &8➟ &f-100"
        lore:
          - ""
          - "&7Decrease your order by"
          - "&7exactly &c100 &7blocks."
          - ""
          - "&c» &fLeft-Click to Remove"
      "9":
        amount: 500
        slot: 9
        material: REDSTONE_BLOCK
        display-name: "&c&lREMOVE BLOCKS &8➟ &f-500"
        lore:
          - ""
          - "&7Decrease your order by"
          - "&7exactly &c500 &7blocks."
          - ""
          - "&c» &fLeft-Click to Remove"

  # ----------------------------------------------------------
  # CUSTOM INPUT
  # ----------------------------------------------------------
  custom-input:
    slot: 31
    material: PAPER
    display-name: "&b&lCUSTOM QUANTITY"
    lore:
      - ""
      - "&7Manually enter the exact"
      - "&7number of blocks to buy."
      - ""
      - "&b» &fClick to Set Amount"

  # ----------------------------------------------------------
  # TOTAL QUOTE
  # ----------------------------------------------------------
  info:
    slot: 13
    material: GOLDEN_SHOVEL
    display-name: "&#FFC427&lTOTAL QUOTE"
    lore:
      - ""
      - " &7➟ &fQuantity: &e<amount> blocks"
      - " &7➟ &fUnit Price: &a<unit_price>"
      - ""
      - " &7➟ &fTotal Cost: &6<total>"
      - ""

  # ----------------------------------------------------------
  # NAVIGATION
  # ----------------------------------------------------------
  navigation:
    cancel:
      slot: 30
      material: BARRIER
      display-name: "&c&lCANCEL ORDER"
      lore:
        - ""
        - "&7Discard this order and"
        - "&7exit the shop."
        - ""
        - "&c» &fClick to Cancel"
    confirm:
      slot: 32
      material: NETHER_STAR
      display-name: "&a&lCONFIRM PURCHASE"
      lore:
        - ""
        - "&7Finalize the purchase of"
        - "&7your selected blocks."
        - ""
        - "&a» &fClick to Buy"
