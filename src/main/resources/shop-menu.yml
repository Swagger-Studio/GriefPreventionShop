# ==========================================================
# This menu uses a STATEFUL logic. 
# Players add/remove blocks to their cart, see the total, and confirm.

gui:
  size: 36
  title: "&#FDC05C&lTREASURY &8➟ &7Order Size: &#FDC05C<amount>"

  # ----------------------------------------------------------
  # ORDER EXPANSION (ADDITION)
  # ----------------------------------------------------------
  buttons:
    add:
      "15":
        amount: 50
        slot: 15
        material: EMERALD_BLOCK
        display-name: "&#55FF55&lEXPAND ORDER &8➟ &f+50"
        lore:
          - "&8Logistics"
          - ""
          - "&7Increase your current order"
          - "&7by &a50 additional &7blocks."
          - ""
          - '&#FDC05C⏵ Left-Click to Expand'
      "16":
        amount: 100
        slot: 16
        material: EMERALD_BLOCK
        display-name: "&#55FF55&lEXPAND ORDER &8➟ &f+100"
        lore:
          - "&8Logistics"
          - ""
          - "&7Increase your current order"
          - "&7by &a100 additional &7blocks."
          - ""
          - '&#FDC05C⏵ Left-Click to Expand'
      "17":
        amount: 500
        slot: 17
        material: EMERALD_BLOCK
        display-name: "&#55FF55&lEXPAND ORDER &8➟ &f+500"
        lore:
          - "&8Logistics"
          - ""
          - "&7Increase your current order"
          - "&7by &a500 additional &7blocks."
          - ""
          - '&#FDC05C⏵ Left-Click to Expand'

    # ----------------------------------------------------------
    # ORDER REDUCTION (SUBTRACTION)
    # ----------------------------------------------------------
    remove:
      "11":
        amount: 50
        slot: 11
        material: REDSTONE_BLOCK
        display-name: "&#FF5555&lREDUCE ORDER &8➟ &f-50"
        lore:
          - "&8Logistics"
          - ""
          - "&7Decrease your current order"
          - "&7by &c50 blocks&7."
          - ""
          - '&#FDC05C⏵ Left-Click to Reduce'
      "10":
        amount: 100
        slot: 10
        material: REDSTONE_BLOCK
        display-name: "&#FF5555&lREDUCE ORDER &8➟ &f-100"
        lore:
          - "&8Logistics"
          - ""
          - "&7Decrease your current order"
          - "&7by &c100 blocks&7."
          - ""
          - '&#FDC05C⏵ Left-Click to Reduce'
      "9":
        amount: 500
        slot: 9
        material: REDSTONE_BLOCK
        display-name: "&#FF5555&lREDUCE ORDER &8➟ &f-500"
        lore:
          - "&8Logistics"
          - ""
          - "&7Decrease your current order"
          - "&7by &c500 blocks&7."
          - ""
          - '&#FDC05C⏵ Left-Click to Reduce'

  # ----------------------------------------------------------
  # CUSTOM QUOTA
  # ----------------------------------------------------------
  custom-input:
    slot: 31
    material: PAPER
    display-name: "&#55FFFF&lCUSTOM QUOTA"
    lore:
      - "&8Logistics"
      - ""
      - "&7Prefer a specific number?"
      - "&7Type the exact quantity in"
      - "&7the command relay."
      - ""
      - '&#FDC05C⏵ Click to Dispatch'

  # ----------------------------------------------------------
  # ORDER SUMMARY
  # ----------------------------------------------------------
  info:
    slot: 13
    material: GOLDEN_SHOVEL
    display-name: "&#FDC05C&lORDER SUMMARY"
    lore:
      - "&8Invoicing"
      - ""
      - " &#FDC05C◆ &fUnits: &e<amount> blocks"
      - " &#FDC05C◆ &fRate: &a$<unit_price> ea."
      - ""
      - " &#FDC05C◆ &fFinal Cost: &6$<total>"
      - ''

  # ----------------------------------------------------------
  # DISPATCH & ABORT
  # ----------------------------------------------------------
  navigation:
    cancel:
      slot: 30
      material: BARRIER
      display-name: "&#FF5555&lABORT SHIPMENT"
      lore:
        - "&8Return"
        - ""
        - "&7Discard this order and"
        - "&7return to the field."
        - ""
        - '&#FDC05C⏵ Click to Abort'
    confirm:
      slot: 32
      material: NETHER_STAR
      display-name: "&#55FF55&lDISPATCH SHIPMENT"
      lore:
        - "&aVerification"
        - ""
        - "&7Confirm the quoted cost"
        - "&7and process the delivery."
        - ""
        - '&#FDC05C⏵ Click to Dispatch'
