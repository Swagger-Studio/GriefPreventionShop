# ==========================================================
# CLAIM SHOP CONFIGURATION
# ==========================================================

messages:
  shop:
    enter-amount:
      enabled: true
      type: "title, actionbar"
      actionbar:
        message: "&e<seconds> &fSeconds Remaining"
      title:
        main: "&e&lENTER AMOUNT"
        sub: "&fPlease specify quantity in chat... (&e<seconds>s&f)"
        duration:
          fade_in: 0
          stay: 2000
          fade_out: 0

    amount-set:
      enabled: true
      type: "actionbar"
      message: "&#FFC427CLAIM SHOP &7➟ &fCart Updated: &e<amount> &fBlocks"

    cancelled:
      enabled: true
      type: "chat"
      message: "&#FFC427&lCLAIM SHOP &7➟ &fInput cancelled."

    timeout:
      enabled: true
      type: "chat, title"
      message: "&#FFC427&lCLAIM SHOP &7➟ &fTimed out, please try again."
      title:
        main: "&c&lTIMED OUT"
        sub: "&fSession expired. Please try again."
        duration:
          fade_in: 0
          stay: 2000
          fade_out: 0

    selected:
      enabled: true
      type: "chat"
      message: "&#FFC427&lCLAIM SHOP &7➟ &fSelected &e<amount> &fclaim blocks."

    purchase-success:
      enabled: true
      type: "chat"
      message: "&#FFC427&lCLAIM SHOP &7➟ &fPurchased &e<amount> &fblocks for &e<price>&f."

  error:
    no-permission:
      enabled: true
      type: "chat"
      message: "&#FFC427&lCLAIM SHOP &7➟ &cYou do not have permission to do this."
    invalid-input:
      enabled: true
      type: "chat"
      message: "&#FFC427&lCLAIM SHOP &7➟ &fInvalid input. Please enter numbers only."
    invalid-amount:
      enabled: true
      type: "chat"
      message: "&#FFC427&lCLAIM SHOP &7➟ &fPlease enter a number greater than 0."
    limit-exceeded:
      enabled: true
      type: "chat"
      message: "&#FFC427&lCLAIM SHOP &7➟ &fOrder Limit! Min: &e<min> &fMax: &e<max>&f."
    not-enough-money:
      enabled: true
      type: "chat"
      message: "&#FFC427&lCLAIM SHOP &7➟ &fYou don't have enough money! Need: &e<price>&f."
    economy-unavailable:
      enabled: true
      type: "chat"
      message: "&#FFC427&lCLAIM SHOP &7➟ &fEconomy system is unavailable."
    transaction-failed:
      enabled: true
      type: "chat"
      message: "&#FFC427&lCLAIM SHOP &7➟ &cSystem Error! Transaction could not be verified."

  admin:
    reloaded:
      enabled: true
      type: "chat"
      message: "&#FFC427&lCLAIM SHOP &7➟ &fConfigs and GUI re-initialized."
