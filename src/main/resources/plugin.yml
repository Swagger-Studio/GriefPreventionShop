name: GriefPreventionShop
version: 1.0.0
main: com.swaggerstudio.griefpreventionshop.GriefPreventionShop
api-version: 1.18
depend: [GriefPrevention, Vault]
author: SwaggerStudio
description: Purchase claim blocks with a GUI economy shop.
website: https://swaggers.studio/

commands:
  # We don't register the main command here because we do it dynamically
  # but we can register a fallback admin command just in case.
  gpshop:
    description: Admin command for GriefPreventionShop
    permission: griefpreventionshop.admin
    usage: /gpshop reload

permissions:
  griefpreventionshop.admin:
    description: Allows reloading the plugin and using admin features
    default: op
  griefpreventionshop.use:
    description: Allows opening the claim shop
    default: true
